name: Update ADS Citation Metrics

on:
  schedule:
    - cron: "0 1 * * 1"  # Every Monday at 01:00 UTC (3h gap before publications)
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run metrics update script
        env:
          ADS_DEV_KEY: ${{ secrets.ADS_DEV_KEY }}
          ADS_ORCID: ${{ secrets.ADS_ORCID }}
        run: |
          python scripts/fetch_ads_metrics_to_data_dir.py --orcid $ADS_ORCID

      - name: Pull latest changes
        run: |
          git fetch origin
          git pull origin main --ff-only

      - name: Commit updated metrics file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/data/ads_metrics.json
          git commit -m "Update ADS metrics [automated]" || echo "No changes to commit"
          git push origin main

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Workflow failed: ${context.workflow} (run ${context.runId})`,
              body: [
                `**Workflow:** ${context.workflow}`,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Triggered by:** ${context.eventName}`,
                `**SHA:** ${context.sha}`,
                ``,
                `Auto-created by \`if: failure()\`. Investigate run logs at the URL above.`
              ].join('\n'),
              labels: ['workflow-failure', 'automated']
            })
