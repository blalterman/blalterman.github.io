name: Deploy Static Site to GitHub Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Update ADS Publications List"
      - "Generate Figure Data"
      - "Update ADS Citation Metrics"
      - "Update NASA ADS Citations Plot and Data"
      - "Update All Timeline Plots"
      - "Convert PDFs to SVG"
    types:
      - completed

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main # Checkout main branch, which contains the latest data

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20' # Use a Node.js version compatible with your project

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
